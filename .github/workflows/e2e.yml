name: E2E Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build site
        run: npm run build
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_TEST_SECRET_KEY || 'sk_test_placeholder' }}
          PUBLIC_STRIPE_KEY: ${{ secrets.PUBLIC_STRIPE_TEST_KEY || 'pk_test_placeholder' }}

      - name: Start preview server
        run: nohup npx astro preview --host 0.0.0.0 --port 4321 > /tmp/preview.log 2>&1 &

      - name: Wait for preview server
        run: |
          echo "Waiting for preview server on 127.0.0.1:4321..."
          for i in $(seq 1 60); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:4321 2>/dev/null) || true
            if echo "$STATUS" | grep -qE "^[2345]"; then
              echo "Server ready (HTTP $STATUS) after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start after 60s"
          cat /tmp/preview.log || true
          exit 1

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          BASE_URL: http://127.0.0.1:4321
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_TEST_SECRET_KEY || 'sk_test_placeholder' }}
          PUBLIC_STRIPE_KEY: ${{ secrets.PUBLIC_STRIPE_TEST_KEY || 'pk_test_placeholder' }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30